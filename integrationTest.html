<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Folder Integration Test</title>
    <link rel="stylesheet" href="customerStyles.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; }
        .test-container { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .test-result { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .pass { background: #d1fae5; border: 1px solid #10b981; color: #065f46; }
        .fail { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; }
        .info { background: #dbeafe; border: 1px solid #3b82f6; color: #1e40af; }
        button { background: #265DAB; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; margin: 5px; }
        button:hover { background: #1e4b8f; }
    </style>
</head>
<body>
    <h1>🧪 Web Folder Integration Test</h1>
    <p>Testing the integration between all files in the web folder.</p>

    <div class="test-container">
        <h3>📁 File Loading Tests</h3>
        <div id="fileLoadingResults"></div>
        <button onclick="testFileLoading()">Test File Loading</button>
    </div>

    <div class="test-container">
        <h3>🔧 Service Integration Tests</h3>
        <div id="serviceIntegrationResults"></div>
        <button onclick="testServiceIntegration()">Test Service Integration</button>
    </div>

    <div class="test-container">
        <h3>📊 Dashboard Functionality Tests</h3>
        <div id="dashboardResults"></div>
        <button onclick="testDashboardFunctions()">Test Dashboard Functions</button>
    </div>

    <div class="test-container">
        <h3>🎨 Styling Tests</h3>
        <div id="stylingResults"></div>
        <button onclick="testStyling()">Test CSS Styling</button>
    </div>

    <!-- Include all the web folder files -->
    <script src="customerResolutionService.js"></script>
    <script src="customerUtils.js"></script>
    <script src="customerDashboard.js"></script>

    <script>
        let testResults = {
            fileLoading: [],
            serviceIntegration: [],
            dashboard: [],
            styling: []
        };

        function addResult(category, test, passed, message) {
            testResults[category].push({ test, passed, message });
            updateDisplay(category);
        }

        function updateDisplay(category) {
            const container = document.getElementById(category === 'serviceIntegration' ? 'serviceIntegrationResults' : 
                                                   category === 'fileLoading' ? 'fileLoadingResults' :
                                                   category === 'dashboard' ? 'dashboardResults' : 'stylingResults');
            
            const results = testResults[category];
            container.innerHTML = results.map(result => 
                `<div class="test-result ${result.passed ? 'pass' : 'fail'}">
                    ${result.passed ? '✅' : '❌'} ${result.test}: ${result.message}
                </div>`
            ).join('');
        }

        function testFileLoading() {
            testResults.fileLoading = [];
            
            // Test CustomerResolutionService
            try {
                const service = new CustomerResolutionService();
                addResult('fileLoading', 'CustomerResolutionService', true, 'Class instantiated successfully');
                
                // Test basic functionality
                const testId = service.resolveCustomer('Test Customer', 'Test Store');
                addResult('fileLoading', 'Basic Resolution', !!testId, testId ? `Generated ID: ${testId}` : 'Failed to generate customer ID');
                
            } catch (error) {
                addResult('fileLoading', 'CustomerResolutionService', false, `Error: ${error.message}`);
            }

            // Test CustomerUtils
            try {
                if (typeof window.customerUtils !== 'undefined') {
                    const testAmount = window.customerUtils.formatCurrency(123.45);
                    addResult('fileLoading', 'CustomerUtils', true, `Currency formatting works: ${testAmount}`);
                } else {
                    addResult('fileLoading', 'CustomerUtils', false, 'customerUtils not found in window object');
                }
            } catch (error) {
                addResult('fileLoading', 'CustomerUtils', false, `Error: ${error.message}`);
            }

            // Test Dashboard functions
            try {
                if (typeof initCustomerDashboard === 'function') {
                    addResult('fileLoading', 'Dashboard Functions', true, 'Dashboard functions loaded successfully');
                } else {
                    addResult('fileLoading', 'Dashboard Functions', false, 'initCustomerDashboard function not found');
                }
            } catch (error) {
                addResult('fileLoading', 'Dashboard Functions', false, `Error: ${error.message}`);
            }
        }

        function testServiceIntegration() {
            testResults.serviceIntegration = [];
            
            try {
                const service = new CustomerResolutionService();
                
                // Test enhanced resolution with store validation
                const id1 = service.resolveCustomer('John Smith', 'Target');
                const id2 = service.resolveCustomer('John Smith', 'Walmart');
                const id3 = service.resolveCustomer('Jon Smith', 'Target'); // Similar name, same store
                
                addResult('serviceIntegration', 'Store Validation', id1 !== id2, 
                    `Different stores create different customers: ${id1 !== id2}`);
                
                addResult('serviceIntegration', 'Name Similarity', id1 === id3, 
                    `Similar names at same store should match: ${id1 === id3}`);
                
                // Test incremental processing
                const receipts = [
                    { id: '1', customerName: 'Alice Johnson', storeName: 'CVS', date: '2025-08-17', total: 25.50 },
                    { id: '2', customerName: 'Bob Wilson', storeName: 'Walgreens', date: '2025-08-17', total: 18.75 }
                ];
                
                const results = service.processNewReceipts(receipts);
                addResult('serviceIntegration', 'Batch Processing', results.processedCount === 2, 
                    `Processed ${results.processedCount} receipts`);
                
                // Test statistics
                const stats = service.getStats();
                addResult('serviceIntegration', 'Statistics', stats.totalCustomers > 0, 
                    `Stats generated: ${stats.totalCustomers} customers, ${stats.totalAliases} aliases`);
                
            } catch (error) {
                addResult('serviceIntegration', 'Service Integration', false, `Error: ${error.message}`);
            }
        }

        function testDashboardFunctions() {
            testResults.dashboard = [];
            
            try {
                // Test utility functions
                if (window.customerUtils) {
                    const testItems = window.customerUtils.parseItemCSV('Bread,2,5.00,10.00\nMilk,1,3.50,3.50');
                    addResult('dashboard', 'CSV Parsing', testItems.length === 2, 
                        `Parsed ${testItems.length} items from CSV`);
                    
                    const testDate = window.customerUtils.formatDate('2025-08-17');
                    addResult('dashboard', 'Date Formatting', testDate.length > 0, 
                        `Date formatted: ${testDate}`);
                }
                
                // Test global functions exist
                const globalFunctions = ['viewCustomerHistory', 'viewCustomerDetails', 'closeModal'];
                let functionsExist = 0;
                
                globalFunctions.forEach(funcName => {
                    if (typeof window[funcName] === 'function') {
                        functionsExist++;
                    }
                });
                
                addResult('dashboard', 'Global Functions', functionsExist === globalFunctions.length, 
                    `${functionsExist}/${globalFunctions.length} global functions available`);
                
            } catch (error) {
                addResult('dashboard', 'Dashboard Functions', false, `Error: ${error.message}`);
            }
        }

        function testStyling() {
            testResults.styling = [];
            
            try {
                // Test if styles are loaded by checking computed styles
                const testDiv = document.createElement('div');
                testDiv.className = 'customer-card';
                document.body.appendChild(testDiv);
                
                const styles = window.getComputedStyle(testDiv);
                const hasBackground = styles.backgroundColor !== 'rgba(0, 0, 0, 0)' && styles.backgroundColor !== 'transparent';
                
                addResult('styling', 'CSS Loading', hasBackground, 
                    hasBackground ? 'Customer card styles applied' : 'CSS may not be loading properly');
                
                document.body.removeChild(testDiv);
                
                // Test responsive design classes exist
                const responsiveTest = document.createElement('style');
                responsiveTest.textContent = '.test-responsive { display: block; }';
                document.head.appendChild(responsiveTest);
                
                addResult('styling', 'Style Injection', true, 'Style injection working');
                
                document.head.removeChild(responsiveTest);
                
            } catch (error) {
                addResult('styling', 'Styling Tests', false, `Error: ${error.message}`);
            }
        }

        // Run initial tests
        window.addEventListener('load', () => {
            console.log('🧪 Integration test page loaded');
            console.log('Files available:');
            console.log('- CustomerResolutionService:', typeof CustomerResolutionService);
            console.log('- customerUtils:', typeof window.customerUtils);
            console.log('- initCustomerDashboard:', typeof initCustomerDashboard);
        });
    </script>
</body>
</html>
